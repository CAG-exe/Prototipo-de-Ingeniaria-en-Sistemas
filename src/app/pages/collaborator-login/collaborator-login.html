<div class="min-h-screen bg-slate-50 flex flex-col justify-center items-center p-6 font-sans">
  <div class="w-full max-w-md bg-white p-8 rounded-2xl shadow-xl shadow-slate-200/50 border border-slate-100">
    <h1 class="text-2xl font-extrabold text-slate-900 mb-2">Inicio de Sesión de Colaborador</h1>
    <p class="text-sm text-slate-500 mb-6">Ingresá tus credenciales para gestionar tus talleres.</p>
    
    <form class="flex flex-col gap-4">
      <div>
        <label class="block text-sm font-semibold text-slate-700 mb-1">Correo Electrónico</label>
        <input type="email" [(ngModel)]="email" name="email" class="w-full border border-slate-300 rounded-xl px-4 py-2.5 text-slate-800 focus:border-emerald-500 focus:outline-none" placeholder="correo@ejemplo.com">
      </div>
      <div>
        <label class="block text-sm font-semibold text-slate-700 mb-1">Contraseña</label>
        <input type="password" [(ngModel)]="password" name="password" class="w-full border border-slate-300 rounded-xl px-4 py-2.5 text-slate-800 focus:border-emerald-500 focus:outline-none" placeholder="Tu contraseña">
      </div>
      <button type="button" (click)="login()" class="w-full mt-4 bg-emerald-600 text-white font-semibold py-3 px-4 rounded-xl hover:bg-emerald-700 transition">
        Iniciar Sesión
      </button>
    </form>
    
    <div class="mt-6 flex flex-col gap-3 text-center">
      <a routerLink="/register-collaborator" class="text-emerald-600 font-semibold hover:underline text-sm font-medium">Registrate como Colaborador</a>
      <a routerLink="/" class="text-slate-500 hover:text-slate-800 transition text-sm pt-2">Volver al inicio</a>
    </div>
  </div>
</div>
