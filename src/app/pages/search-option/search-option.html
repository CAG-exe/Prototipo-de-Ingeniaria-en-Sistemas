    </header>

    let textoBusqueda = "";

function comprobarHorarioDinamico(horarioTaller, textoUsuario) {
      if (textoUsuario === "") return true;

      const hLower = horarioTaller.toLowerCase();
      
      // 1. Traducir el texto del taller a días específicos
      let diasDisponibles = "";
      if (hLower.includes("lun–vie") || hLower.includes("lun-vie")) {
        diasDisponibles = "lunes martes miercoles miércoles jueves viernes";
      } else if (hLower.includes("lun–sáb") || hLower.includes("lun-sab")) {
        diasDisponibles = "lunes martes miercoles miércoles jueves viernes sabado sábado";
      } else if (hLower.includes("todos los días") || hLower.includes("todos los dias")) {
        diasDisponibles = "lunes martes miercoles miércoles jueves viernes sabado sábado domingo";
      } else if (hLower.includes("mar–jue") || hLower.includes("mar-jue")) {
        diasDisponibles = "martes miercoles miércoles jueves";
      } else if (hLower.includes("lun–mie") || hLower.includes("lun-mie")) {
        diasDisponibles = "lunes martes miercoles miércoles";
      }

      // 2. Extraer el rango de horas del taller (Busca números con formato de hora)
      let horaApertura = 0;
      let horaCierre = 0;
      const matchHoras = hLower.match(/(\d{1,2}):\d{2}.*?(\d{1,2}):\d{2}/);
      if (matchHoras) {
        horaApertura = parseInt(matchHoras[1]);
        horaCierre = parseInt(matchHoras[2]);
      }

      // 3. Analizar qué intentó buscar el usuario
      const diasSemana = ["lunes", "martes", "miercoles", "miércoles", "jueves", "viernes", "sabado", "sábado", "domingo"];
      const diaBuscado = diasSemana.find(d => textoUsuario.includes(d));

      let horaBuscada = null;
      const matchNumero = textoUsuario.match(/\b([0-2]?[0-9])\b/); // Busca un número suelto en el texto
      if (matchNumero) {
        horaBuscada = parseInt(matchNumero[1]);
      }

      // Si el usuario no escribió ni un día claro ni una hora, hacemos una búsqueda de texto normal
      if (!diaBuscado && horaBuscada === null) {
        return hLower.includes(textoUsuario);
      }

      // 4. Validar si el taller cumple
      let cumpleDia = true;
      if (diaBuscado) {
        cumpleDia = diasDisponibles.includes(diaBuscado);
      }

      let cumpleHora = true;
      if (horaBuscada !== null && horaApertura > 0 && horaCierre > 0) {
        // Se asegura de que la hora que busca el usuario esté entre la apertura y el cierre
        cumpleHora = horaBuscada >= horaApertura && horaBuscada <= horaCierre;
      }

      return cumpleDia && cumpleHora;
    }

    function filtrarTalleres() {
      const texto = textoBusqueda.toLowerCase().trim();
      const dir = textoDireccion.toLowerCase().trim();
      const hor = textoHorario.toLowerCase().trim();
      return talleres.filter((t) => {
        // Coincidencia general
        const matchGeneral =
          texto === "" ||
          t.nombre.toLowerCase().includes(texto) ||
          t.rubro.toLowerCase().includes(texto);
          
        // Coincidencias específicas
        const matchDir = dir === "" || t.direccion.toLowerCase().includes(dir);
        const matchHor = comprobarHorarioDinamico(t.horario, hor);

        // Retorna verdadero solo si cumple TODOS los criterios ingresados
        return matchGeneral && matchDir && matchHor;
      });
    }
 
function renderCard(taller, index) {
      const fotoContent = taller.fotoUrl
        ? `<img src="${taller.fotoUrl}" alt="Foto de ${taller.nombre}" loading="lazy" />`
        : `<span class="photo-placeholder">Foto</span>`;
 
      return `
        <article
          class="taller-card"
          data-id="${taller.id}"
          role="button"
          tabindex="0"
          aria-label="Ver detalles de ${taller.nombre}"
          style="animation-delay:${index * 60}ms"
        >
          <div class="card-info">
            <h2 class="card-name">${taller.nombre}</h2>
            <div class="card-meta">
              <span class="card-meta-separator" aria-hidden="true"></span>
              <span class="card-meta-item">${taller.horario}</span>
              <span class="card-meta-separator" aria-hidden="true"></span>
              <span class="card-meta-item">${taller.direccion}</span>
            </div>
            <div class="card-meta">
              <span class="card-meta-separator" aria-hidden="true"></span>
              <span class="card-meta-item">${taller.telefono}</span>
              <span class="card-meta-separator" aria-hidden="true"></span>
              <span class="card-meta-item">${taller.redes}</span>
            </div>
            <span class="card-rubro">${taller.rubro}</span>
          </div>
          <div class="card-photo" aria-hidden="true">${fotoContent}</div>
        </article>
      `;
    }
 
function renderResultados() {
      const resultados = filtrarTalleres(); 
      const lista      = document.getElementById("resultsList");
      const emptyState = document.getElementById("emptyState");
 
      if (resultados.length === 0) {
        lista.innerHTML = "";
        emptyState.classList.remove("hidden");
      } else {
        emptyState.classList.add("hidden");
        lista.innerHTML = resultados.map((t, i) => renderCard(t, i)).join("");
        bindCardEvents();
      }
    }
    function bindCardEvents() {
      document.querySelectorAll(".taller-card").forEach((card) => {
        card.addEventListener("click", () => onCardClick(Number(card.dataset.id)));
        card.addEventListener("keydown", (e) => {
          if (e.key === "Enter" || e.key === " ") {
            e.preventDefault();
            onCardClick(Number(card.dataset.id));
          }
        });
      });
    }
 
    function onCardClick(id) {
      const taller = talleres.find((t) => t.id === id);
      if (taller) {
        console.log("Taller seleccionado:", taller);
      }
    }


 
document.addEventListener("DOMContentLoaded", () => {
  const searchInput = document.getElementById("searchInput");
  const searchBtn   = document.getElementById("searchBtn");
  const btnAdvanced = document.getElementById("btnAdvanced");
  const panelAdvanced = document.getElementById("panelAdvanced");
  const inputDireccion = document.getElementById("inputDireccion");
  const inputHorario = document.getElementById("inputHorario");

      // Buscar a medida que escribes
      searchInput.addEventListener("input", () => {
        textoBusqueda = searchInput.value;
        renderResultados();
      });
      btnAdvanced.addEventListener("click", () => {
        panelAdvanced.classList.toggle("hidden");
        btnAdvanced.textContent = panelAdvanced.classList.contains("hidden") 
          ? "Filtros avanzados ▼" 
          : "Ocultar filtros ▲";
      });

      // Eventos para campos avanzados
        inputDireccion.addEventListener("input", () => {
        textoDireccion = inputDireccion.value;
        renderResultados();
      });

        inputHorario.addEventListener("input", () => {
        textoHorario = inputHorario.value;
        renderResultados();
      });
      renderResultados();
    });
