    </header>
    <main class="results-section">

  </div>
 
  <script>

      {

function renderCard(taller, index) {
      const fotoContent = taller.fotoUrl
        ? `<img src="${taller.fotoUrl}" alt="Foto de ${taller.nombre}" loading="lazy" />`
        : `<span class="photo-placeholder">Foto</span>`;
 
      return `
        <article
          class="taller-card"
          data-id="${taller.id}"
          role="button"
          tabindex="0"
          aria-label="Ver detalles de ${taller.nombre}"
          style="animation-delay:${index * 60}ms"
        >
          <div class="card-info">
            <h2 class="card-name">${taller.nombre}</h2>
            <div class="card-meta">
              <span class="card-meta-separator" aria-hidden="true"></span>
              <span class="card-meta-item">${taller.horario}</span>
              <span class="card-meta-separator" aria-hidden="true"></span>
              <span class="card-meta-item">${taller.direccion}</span>
            </div>
            <div class="card-meta">
              <span class="card-meta-separator" aria-hidden="true"></span>
              <span class="card-meta-item">${taller.telefono}</span>
              <span class="card-meta-separator" aria-hidden="true"></span>
              <span class="card-meta-item">${taller.redes}</span>
            </div>
            <span class="card-rubro">${taller.rubro}</span>
          </div>
          <div class="card-photo" aria-hidden="true">${fotoContent}</div>
        </article>
      `;
    }
 
function renderResultados() {
      const resultados = talleres; 
      const lista      = document.getElementById("resultsList");
 
      if (resultados.length === 0) {
        lista.innerHTML = "";
      } else {
        const plural = resultados.length !== 1;
        lista.innerHTML = resultados.map((t, i) => renderCard(t, i)).join("");
        bindCardEvents();
      }
    }
 
document.addEventListener("DOMContentLoaded", () => {
      renderResultados();
    });
  </script>
</body>
