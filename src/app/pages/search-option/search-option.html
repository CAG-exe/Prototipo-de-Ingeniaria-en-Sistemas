<article
  class="flex items-center justify-between gap-4 px-4 py-3 bg-white border-b border-slate-200 cursor-pointer hover:bg-slate-50"
  [class.border-l-4]="selected()"
  [class.border-l-orange-600]="selected()"
  [class.bg-orange-50]="selected()"
  [attr.aria-label]="'Ver detalles de ' + taller().nombre"
>
  <div class="flex-1 min-w-0">
    <h3 class="font-semibold text-slate-900 truncate">{{ taller().nombre }}</h3>
    <span class="inline-block mb-1 text-xs font-semibold text-orange-600 bg-orange-50 rounded-full px-2 py-0.5">
      {{ taller().rubro }}
    </span>
    @if (taller().atencion) {
      <p class="text-xs text-slate-500 mt-0.5 truncate">{{ taller().atencion }}</p>
    }
    @if (taller().direccion; as dir) {
      <p class="text-xs text-slate-400 truncate">{{ formatDireccion(dir) }}</p>
    }
  </div>
</article>
