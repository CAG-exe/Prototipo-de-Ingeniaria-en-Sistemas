<div class="h-full my-1 p-4 sm:p-5 bg-white rounded-xl shadow border border-slate-200/70">
  <div class="flex flex-col sm:flex-row gap-4 sm:gap-5">
    
    <div class="flex-1 space-y-3">
      <div class="flex items-center justify-between gap-3">
        <h1 class="text-xl sm:text-2xl font-bold text-slate-800 leading-tight">{{ user()?.name }}</h1>
        <div class="flex items-center gap-2">
          <span class="text-[11px] font-bold uppercase tracking-wider text-slate-400">
            {{ user()?.enable ? 'Activo' : 'Inactivo' }}
          </span>
          <label class="relative inline-flex items-center cursor-pointer">
            <input 
              type="checkbox" 
              [checked]="user()?.enable" 
              (change)="toggleStatus()" 
              class="sr-only peer"
            >
            <div class="w-11 h-6 bg-slate-200 peer-focus:outline-none peer-focus:ring-4 peer-focus:ring-blue-300 rounded-full peer peer-checked:after:translate-x-full rtl:peer-checked:after:-translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:start-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-blue-600"></div>
          </label>
        </div>
      </div>

      <div class="bg-slate-50/70 rounded-lg p-3 border border-slate-100">
        <div class="grid gap-2 sm:grid-cols-2 text-[13.5px] text-slate-700">
          <p><span class="font-semibold text-slate-500 mr-1">Email:</span> {{ user()?.email || 'N/A' }}</p>
          <p><span class="font-semibold text-slate-500 mr-1">Teléfono:</span> {{ user()?.movil || 'N/A' }}</p>
          <p><span class="font-semibold text-slate-500 mr-1">ID:</span> {{ user()?.id }}</p>
          <p><span class="font-semibold text-slate-500 mr-1">Talleres:</span> {{ user()?.workshops?.length || 0 }} inscritos</p>
        </div>
      </div>

      <div *ngIf="user()?.workshops?.length" class="mt-2 text-[12px]">
        <span class="font-semibold text-slate-500 block mb-1">IDs de Talleres:</span>
        <div class="flex flex-wrap gap-1">
          <a 
            *ngFor="let workshopId of user()?.workshops" 
            [routerLink]="['/taller', workshopId]"
            class="px-2 py-0.5 bg-slate-100 text-slate-600 rounded-md border border-slate-200 hover:bg-blue-50 hover:text-blue-600 hover:border-blue-200 transition-colors cursor-pointer"
          >
            #{{ workshopId }}
          </a>
        </div>
      </div>

    </div>

    <!-- User Avatar Placeholder -->
    <div class="w-full sm:w-24 md:w-28 shrink-0 flex items-center justify-center">
      <div class="w-20 h-20 sm:w-24 sm:h-24 rounded-full bg-blue-50 border-2 border-blue-100 flex items-center justify-center text-blue-600 shadow-inner">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-10 h-10">
          <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0ZM4.501 20.118a7.5 7.5 0 0 1 14.998 0A17.933 17.933 0 0 1 12 21.75c-2.676 0-5.216-.584-7.499-1.632Z" />
        </svg>
      </div>
    </div>

  </div>
</div>
