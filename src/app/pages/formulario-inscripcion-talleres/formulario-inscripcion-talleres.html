<div class="flex flex-col items-center justify-center p-4 min-h-screen bg-slate-50 font-sans">
  <form
    (ngSubmit)="registrarTaller()"
    class="p-8 bg-white shadow-lg shadow-indigo-950 w-full max-w-2xl gap-6 rounded-2xl"
  >
    <div class="flex flex-col gap-2 mb-4">
      <h2 class="font-semibold text-2xl mb-4 text-center">Registrar nuevo taller</h2>
      <p class="text-base text-slate-500 text-center">
        Para poder inscribirte a este taller, por favor completa el siguiente formulario:
      </p>
    </div>
    <hr class="my-4" />
    <div class="flex flex-col">
      <label for="nombre" class="mt-3">Nombre del taller:</label>
      <input
        type="text"
        id="nombre"
        [(ngModel)]="nombreTaller"
        name="nombreTaller"
        class="border-b border-[#98c9a3] rounded-md py-2 px-3 focus:outline-none focus:ring-2 focus:ring-[#38B000]"
        required
      />
      <label for="rubro" class="mt-3">Rubro / Categoría:</label>
      <input
        type="text"
        id="rubro"
        [(ngModel)]="rubro"
        name="rubro"
        class="border-b border-[#98c9a3] rounded-md py-2 px-3 focus:outline-none focus:ring-2 focus:ring-[#38B000]"
        required
      />
      <label for="email" class="mt-3">Correo Electrónico:</label>
      <input
        type="email"
        id="email"
        required
        [(ngModel)]="correoElectronico"
        name="correoElectronico"
        class="border-b border-[#98c9a3] rounded-md py-2 px-3 focus:outline-none focus:ring-2 focus:ring-[#38B000]"
        required
      />
      <label for="telefono" class="mt-3">Teléfono:</label>
      <input
        type="tel"
        pattern="[0-9]*"
        id="telefono"
        [(ngModel)]="telefono"
        name="telefono"
        class="border-b border-[#98c9a3] rounded-md py-2 px-3 focus:outline-none focus:ring-2 focus:ring-[#38B000]"
        required
      />
      <label class="mt-3 text-lg font-semibold mb-2">Redes sociales</label>
      <select
        class="rounded-2xl p-1"
        [(ngModel)]="redSocial"
        (change)="haveRedSocial()"
        name="redSocial"
      >
        <option value="" disabled selected>Selecciona una red social</option>
        <option value="ninguna">Ninguna</option>
        <!---buscar forma de detecta cuando no se selecciona ninguna -->
        <option value="facebook">Facebook</option>
        <option value="twitter">Twitter</option>
        <option value="instagram">Instagram</option>
        <option value="linkedin">LinkedIn</option>
      </select>
      <input
        type="text"
        [placeholder]="tieneRedSocial ? 'Ingresar nick de la red social' : ''"
        [(ngModel)]="nickname"
        [disabled]="!tieneRedSocial"
        [required]="tieneRedSocial"
        name="nickname"
        class="border-b border-[#98c9a3] rounded-md py-2 px-3 focus:outline-none focus:ring-2 focus:ring-[#38B000] mt-2 disabled:bg-gray-100 disabled:text-gray-400"
      />
    </div>

    <hr class="my-4" />

    <div class="flex flex-col">
      <label class="mt-3 text-lg font-semibold mb-2">Dirección</label>
      <div class="m-1">
        <input
          type="checkbox"
          id="CentroCultural"
          [(ngModel)]="esCentroCultural"
          (change)="limpiarDireccion()"
          name="esCentroCultural"
          class="mr-2"
        />
        <label for="CentroCultural" class="mb-2">El taller se dictará en el Centro Cultural</label>
      </div>

      <label for="calle" class="mt-2">Calle</label>
      <input
        type="text"
        id="calle"
        [(ngModel)]="calle"
        [disabled]="esCentroCultural"
        [required]="!esCentroCultural"
        name="calle"
        class="border-b border-[#98c9a3] rounded-md py-2 px-3 focus:outline-none focus:ring-2 focus:ring-[#38B000] disabled:bg-gray-100 disabled:text-gray-400"
      />

      <label for="altura" class="mt-2">Altura</label>
      <input
        type="text"
        id="altura"
        [(ngModel)]="altura"
        [disabled]="esCentroCultural"
        [required]="!esCentroCultural"
        name="altura"
        class="border-b border-[#98c9a3] rounded-md py-2 px-3 focus:outline-none focus:ring-2 focus:ring-[#38B000] disabled:bg-gray-100 disabled:text-gray-400"
      />

      <label for="localidad" class="mt-2">Localidad</label>
      <input
        type="text"
        id="localidad"
        [(ngModel)]="localidad"
        [disabled]="esCentroCultural"
        [required]="!esCentroCultural"
        name="localidad"
        class="border-b border-[#98c9a3] rounded-md py-2 px-3 focus:outline-none focus:ring-2 focus:ring-[#38B000] disabled:bg-gray-100 disabled:text-gray-400"
      />
    </div>

    <hr class="my-4" />

    <label class="font-semibold text-lg" for="horariosTexto">Horario</label>
    <div class="flex flex-col mb-3">
      <input
        type="text"
        id="horariosTexto"
        [(ngModel)]="horariosTexto"
        name="horariosTexto"
        placeholder="Ej: Lunes y jueves de 16:00HS a 18:00HS"
        class="border-b border-[#98c9a3] rounded-md py-2 px-3 focus:outline-none focus:ring-2 focus:ring-[#38B000]"
        required
      />
    </div>

    <hr />

    <div class="flex flex-col">
      <label class="mt-3 font-semibold text-lg">Descripción</label>
      <textarea
        id="descripcion"
        [(ngModel)]="descripcion"
        name="descripcion"
        class="border-b border-[#98c9a3] rounded-md py-2 px-3 focus:outline-none focus:ring-2 focus:ring-[#006400]"
        required
      ></textarea>
      <p>{{ descripcion }}</p>
    </div>

    <hr />
    <div class="flex flex-col">
      <h2 class="mt-3 font-semibold text-lg">Imagen del taller</h2>
      <div class="p-3 flex justify-start">
        <label
          for="imagen"
          class="rounded-lg w-36 h-10 bg--400 text-black flex items-center justify-center gap-2 bg-[#70E000] border-[#008000] hover:bg-emerald-500 active:bg-emerald-600 transition duration-200 cursor-pointer"
        >
          Ingresar imagen</label
        >
      </div>
      <input type="file" id="imagen" accept="image/*" class="invisible" (change)="capturarImagen($event)" />
      @if (imagen) {
        <p class="text-sm text-slate-500 px-3">Imagen seleccionada: {{ imagen }}</p>
      }
    </div>

    <div class="p-3 mt-6 flex justify-end">
      <button
        class="rounded-lg w-36 h-8 bg--400 text-black flex items-center justify-center gap-2 bg-[#70E000] hover:bg-emerald-500 active:bg-emerald-600 transition duration-200"
      >
        Registrar
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" class="w-4 h-4">
          <path
            d="M4 12.6111L8.92308 17.5L20 6.5"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          />
        </svg>
      </button>
    </div>
  </form>
</div>
