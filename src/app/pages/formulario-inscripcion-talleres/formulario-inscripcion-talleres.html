<head>
  <link rel="stylesheet" href="formulario-inscripcion-talleres.css">
</head>

<body>
  <form>
    <div>
      <section class="section-title">   <!-- imagen de referencia  -->
        <img src="https://chubutahora.com/wp-content/uploads/2026/03/3037593-trelew-apertura-de-inscripciones-a-talleres-culturales.webp" alt="Talleres" class="section-icon">
        <div>
          <h2>Formulario de Inscripción a</h2>
          <h2>"[Talleres]"</h2>
        </div>
      </section>
      <p>Para poder inscribirte a este taller, por favor completa el siguiente formulario:</p>
    </div>
    <hr style ="margin-bottom: 20px;">
    <label for="nombre">Nombre:</label>
    <input type = "text" id="nombre" required>
    <label for="apellido">Apellido:</label>
    <input type = "text" id="apellido" required>
    <label for="email">Correo Electrónico:</label>
    <input type = "email" id="email" required>
    <label for="telefono">Teléfono:</label>
    <input type = "tel" id="telefono" required>
    <div class="button-container">
      <button class="btn-inscription" type="submit">Inscribirse <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" class="icon">
      <path d="M4 12.6111L8.92308 17.5L20 6.5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path>
      </svg>
      </button>
    </div>
  </form>
</body>
