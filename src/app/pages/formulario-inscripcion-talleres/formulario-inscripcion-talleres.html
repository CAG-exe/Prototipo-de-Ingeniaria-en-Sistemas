<div class="flex flex-col items-center justify-center p-4 min-h-screen bg-slate-50 font-sans">
  <form class="p-8 bg-white shadow-lg shadow-indigo-950 w-full max-w-2xl gap-6 rounded-2xl">
    <div class="flex flex-col gap-2 mb-4">
      <h2 class="font-semibold text-2xl mb-4 text-center">Registrar nuevo taller</h2>
      <p class="text-base text-slate-500 text-center">
        Para poder inscribirte a este taller, por favor completa el siguiente formulario:
      </p>
    </div>
    <hr class ="my-4">
    <div class="flex flex-col">
    <label for="nombre" class="mt-3">Nombre del taller:</label>
    <input type = "text" id="nombre" [(ngModel)]="nombreTaller" name="nombreTaller" class="border-b border-[#98c9a3] rounded-md py-2 px-3 focus:outline-none focus:ring-2 focus:ring-[#38B000]" required>
    <label for="email" class="mt-3">Correo Electrónico:</label>
    <input type = "email" id="email" [(ngModel)]="correoElectronico" name="correoElectronico" class="border-b border-[#98c9a3] rounded-md py-2 px-3 focus:outline-none focus:ring-2 focus:ring-[#38B000]" required>
    <label for="telefono" class="mt-3">Teléfono:</label>
    <input type = "tel" pattern="[0-9]*" id="telefono" [(ngModel)]="telefono" name="telefono" class="border-b border-[#98c9a3] rounded-md py-2 px-3 focus:outline-none focus:ring-2 focus:ring-[#38B000]" required>
    <label class="mt-3 text-lg font-semibold mb-2" >Redes sociales</label>
    <select class="rounded-2xl p-1" [(ngModel)]="redSocial" (change)="haveRedSocial()" name="redSocial">
      <option value="" disabled selected>Selecciona una red social</option>
      <option value="ninguna">Ninguna</option>  <!---buscar forma de detecta cuando no se selecciona ninguna -->
      <option value="facebook">Facebook</option>
      <option value="twitter">Twitter</option>
      <option value="instagram">Instagram</option>
      <option value="linkedin">LinkedIn</option>
    </select>
    <input type="text" [placeholder]="tieneRedSocial ? 'Ingresar nick de la red social' : ''" [(ngModel)]="nickname" [disabled]="!tieneRedSocial" [required]="tieneRedSocial" name="nickname" class="border-b border-[#98c9a3] rounded-md py-2 px-3 focus:outline-none focus:ring-2 focus:ring-[#38B000] mt-2 disabled:bg-gray-100 disabled:text-gray-400">

    </div>

    <hr class ="my-4">

    <div class="flex flex-col">
    <label class="mt-3 text-lg font-semibold mb-2">Dirección</label>
    <div class="m-1">
      <input type="checkbox" id="CentroCultural" [(ngModel)]="esCentroCultural" (change)="limpiarDireccion()"name="esCentroCultural" class="mr-2">
      <label for="CentroCultural" class="mb-2">El taller se dictará en el Centro Cultural</label>
    </div>

    <label for="calle" class="mt-2">Calle</label>
    <input type="text" id="calle" [(ngModel)]="calle" [disabled]="esCentroCultural" [required]="!esCentroCultural" name="calle" class="border-b border-[#98c9a3] rounded-md py-2 px-3 focus:outline-none focus:ring-2 focus:ring-[#38B000] disabled:bg-gray-100 disabled:text-gray-400">

    <label for="altura" class="mt-2">Altura</label>
    <input type="number" id="altura" [(ngModel)]="altura" [disabled]="esCentroCultural" [required]="!esCentroCultural" name="altura" class="border-b border-[#98c9a3] rounded-md py-2 px-3 focus:outline-none focus:ring-2 focus:ring-[#38B000] disabled:bg-gray-100 disabled:text-gray-400">

    <label for="localidad" class="mt-2">Localidad</label>
    <input type="text" id="localidad" [(ngModel)]="localidad" [disabled]="esCentroCultural" [required]="!esCentroCultural" name="localidad" class="border-b border-[#98c9a3] rounded-md py-2 px-3 focus:outline-none focus:ring-2 focus:ring-[#38B000] disabled:bg-gray-100 disabled:text-gray-400">
    </div>

    <hr class ="my-4">

    <label class =" font-semibold text-lg " >Horario</label>

<div class="mb-3">
        <div class="flex items-center justify-between">
            <div class="flex items-center min-w-[4rem]">
              <input checked id="monday" name="days" type="checkbox" value="monday" class="w-4 h-4 border border-default-medium rounded-xs bg-neutral-secondary-medium focus:ring-2 focus:ring-brand-soft">
              <label for="monday" class="ms-2 text-sm font-medium text-heading">Lunes</label>
            </div>
            <div class="w-full max-w-[7rem]">
              <label for="start-time-monday" class="sr-only">Sart time:</label>

                  </div>
                  <input type="time" id="start-time-monday" class="block w-full p-2.5 bg-neutral-secondary-medium border border-default-medium text-heading text-sm rounded-base focus:ring-brand focus:border-brand shadow-xs placeholder:text-body" min="09:00" max="18:00" value="00:00" required />
              </div>
            </div>

              </div>

            <div>

</svg>
